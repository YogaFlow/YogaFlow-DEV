# Netlify Build-Konfiguration (YogaFlow-DEV; Legacy – Live ggf. Cloudflare, siehe wrangler.toml)
# Build und Publish-Pfad werden hier definiert; Env-Variablen in der Netlify-UI setzen.

[build]
  command = "npm run build"
  publish = "dist"

# Env-Variablen (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY) bitte in Netlify unter
# Site settings → Environment variables eintragen – Production nur mit PROD-Werten.

# SPA-Fallback: Alle Pfade auf index.html umleiten, damit React Router bei Reload/Direktaufruf funktioniert
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
